name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch branch refs for diff
        run: git fetch --no-tags --prune --depth=200 origin +refs/heads/*:refs/remotes/origin/*

      - name: Tests-first gate
        env:
          CI: 'true'
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: npm run ci:tests-first

      - name: Prettier check
        run: npm run format:check

      - name: ESLint (CI, no fix)
        run: npm run lint:ci

      - name: Typecheck
        run: npx nx run-many -t typecheck -p api -p web

      - name: Build
        run: npx nx run-many -t build -p api -p web

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
