name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  baseline:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    env:
      NX_CACHE_DIRECTORY: .nx/cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Nx cache
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json', 'package.json', 'apps/**/package.json', 'libs/**/package.json') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Fetch branch refs for diff
        run: git fetch --no-tags --prune --depth=200 origin +refs/heads/*:refs/remotes/origin/*

      - name: Resolve Nx affected range
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            NX_BASE="origin/${{ github.base_ref }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            NX_BASE="${{ github.event.before }}"
          else
            NX_BASE="$(git rev-parse HEAD~1)"
          fi

          NX_HEAD="${{ github.sha }}"

          echo "NX_BASE=$NX_BASE" >> "$GITHUB_ENV"
          echo "NX_HEAD=$NX_HEAD" >> "$GITHUB_ENV"
          echo "Using Nx affected range: $NX_BASE..$NX_HEAD"

      - name: Tests-first gate
        env:
          CI: 'true'
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: npm run ci:tests-first

      - name: Prettier check
        run: npm run format:check

      - name: Affected lint
        run: npx nx affected -t lint --base="$NX_BASE" --head="$NX_HEAD" --skipNxCache

      - name: Affected typecheck
        run: npx nx affected -t typecheck --base="$NX_BASE" --head="$NX_HEAD"

      - name: Affected build
        run: npx nx affected -t build --base="$NX_BASE" --head="$NX_HEAD"

      - name: Affected unit tests
        run: npx nx affected -t test --base="$NX_BASE" --head="$NX_HEAD"

      - name: Affected e2e tests
        run: npx nx affected -t test:e2e --base="$NX_BASE" --head="$NX_HEAD"
